<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- META TAG OBLIGATORIO PARA RESPONSIVIDAD EN MÓVILES -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras</title>
    <!-- Cargando el motor de Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="./js/app.js" defer></script>

<style type="text/tailwindcss">

  @import "tailwindcss";

   @layer base {

     :root {

      @apply text-sm;

       line-height: 1.5;
     }
  }

</style>


    <style type="text/tailwindcss">
        @import "tailwindcss"; 
        @layer base {
          :root {
            @apply text-sm;
            line-height: 1.6;
          }
        }
    </style>
</head>
<body class="bg-green-300 p-3 sm:p-8 font-sans min-h-screen flex items-center justify-center">

    <!-- CONTENEDOR PRINCIPAL RESPONSIVO: 
         - w-full y max-w-[350px] para que encaje al milímetro en móviles estrechos.
         - md:max-w-4xl para que se expanda elegantemente en pantallas de ordenador. -->
    <div class="w-full max-w-[350px] xs:max-w-xs sm:max-w-md md:max-w-4xl mx-auto bg-gray-200 p-4 sm:p-6 py-8 md:py-12 rounded-lg shadow-2xl border border-gray-300 select-none overflow-hidden">
        
        <!-- Título centrado en móvil y alineado a la izquierda en PC -->
        <h1 class="text-xl sm:text-2xl font-bold mb-6 flex items-center justify-center md:justify-start gap-2 text-black">
            <span class="text-red-500">🛒</span> Lista de Compras con Precios
        </h1>

        <!-- SECCIÓN DE CONTROLES ADAPTABLES:
             - En móviles se organiza en bloques verticales limpios (flex-col).
             - En PC se distribuye en una fila fluida (md:flex-row md:flex-wrap) con alineación inferior (items-end). -->
        <div class="flex flex-col md:flex-row md:flex-wrap items-stretch md:items-end gap-4 mb-6 border-b border-gray-300 pb-6 text-left">
            
            <!-- Campo de entrada: Producto -->
            <div class="flex flex-col gap-1 w-full md:w-auto">
                <label for="input-producto" class="text-xs font-bold uppercase text-black">Producto:</label>
                <input id="input-producto" type="text" placeholder="Ej: Pan, leche" 
                       class="border border-gray-400 bg-white p-2 cursor-pointer rounded w-full md:w-48 outline-none focus:ring-2 focus:ring-blue-400 font-medium">
            </div>

            <!-- Botón: Agregar -->
            <button onclick="agregarProducto()" 
                    class="w-full md:w-auto bg-amber-500 hover:bg-amber-600 text-white font-bold px-5 py-2 rounded transition cursor-pointer active:scale-95 text-center">
                Agregar
            </button>

            <!-- Campo de entrada: Precio -->
            <div class="flex flex-col gap-1 w-full md:w-auto">
                <label for="input-precio" class="text-xs font-bold uppercase text-black">Precio (€):</label>
                <input id="input-precio" type="number" step="0.01" placeholder="0.00" 
                       class="border border-gray-400 bg-white p-2 cursor-pointer rounded w-full md:w-24 outline-none focus:ring-2 focus:ring-blue-400 font-medium">
            </div>

            <!-- Botón: Calcular Total -->
            <button onclick="calcularTotal()" 
                    class="w-full md:w-auto bg-emerald-500 text-white font-bold px-4 py-2 rounded hover:bg-emerald-600 transition shadow-sm cursor-pointer active:scale-95 text-center">
                Total Compras
            </button>

            <!-- Botón: Vaciar Carrito -->
            <button onclick="vaciarCarrito()" 
                    class="w-full md:w-auto bg-red-500 text-white font-bold px-4 py-2 rounded hover:bg-red-600 transition cursor-pointer active:scale-95 text-center">
                Vaciar Todos
            </button>
        </div>

        <!-- SECCIÓN DE REJILLA INFERIOR (LISTA VS GESTIÓN):
             - En móvil va una caja debajo de la otra (grid-cols-1).
             - En tablets y ordenadores se divide en dos columnas paralelas (md:grid-cols-2). -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
            
            <!-- CONTENEDOR DE LA LISTA DINÁMICA -->
            <div class="bg-white p-4 rounded border border-gray-300 text-left shadow-xs flex flex-col justify-between">
                <div id="lista-container" class="min-h-[120px] max-h-[250px] overflow-y-auto pr-1">
                    <ul id="lista-ul" class="space-y-1 font-mono text-sm text-black">
                        <!-- Los elementos agregados por JavaScript aparecerán aquí -->
                    </ul>
                </div>
                
                <!-- Barra de totales responsiva (Se pliega si falta espacio) -->
                <p class="mt-4 text-xs sm:text-sm text-gray-700 border-t border-gray-200 pt-3 flex items-center justify-between font-bold">
                    <span>Items: <span id="contador" class="text-black font-extrabold">0</span></span> 
                    <span id="display-total" class="text-emerald-700 font-extrabold">Total: €0.00</span>
                </p>
            </div>

            <!-- PANEL DE GESTIÓN DE POSICIÓN (ELIMINAR) -->
            <div class="bg-orange-50 p-5 rounded-lg border border-orange-200 h-fit text-left shadow-xs">
                <h3 class="font-bold text-orange-800 mb-3 text-sm sm:text-base">Gestión de posición</h3>
                
                <!-- Controles de eliminación plegables (Vertical en móvil, en línea en tablets/PC) -->
                <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
                    <input id="input-posicion" type="number" value="0" min="0" 
                           class="border border-gray-400 bg-white p-2 rounded w-full sm:w-20 text-center font-bold text-black">
                    <button onclick="eliminarPorPosicion()" 
                            class="bg-blue-500 hover:bg-blue-600 text-white font-bold border border-blue-600 px-4 py-2 rounded transition w-full cursor-pointer active:scale-95 text-center">
                        Eliminar posición
                    </button>
                </div>
            </div>
            
        </div>
    </div>
</body>
</html>
